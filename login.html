<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveChat — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    font-size: 24px;
  }
  .logo h1 { font-size: 24px; color: #1a1a2e; font-weight: 700; }
  .logo p { color: #888; font-size: 14px; margin-top: 4px; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px 16px;
    border: 2px solid #eee; border-radius: 10px;
    font-size: 15px; outline: none; transition: border 0.2s;
  }
  input:focus { border-color: #667eea; }
  .btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
  .error {
    background: #fff0f0; color: #e53e3e;
    padding: 12px 16px; border-radius: 8px;
    font-size: 14px; margin-bottom: 16px;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">💬</div>
    <h1>LiveChat</h1>
    <p>Agent Dashboard Login</p>
  </div>
  <div class="error" id="error"></div>
  <div class="form-group">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="admin@livechat.com" value="admin@livechat.com">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" value="admin123">
  </div>
  <button class="btn" onclick="login()">Login to Dashboard</button>
</div>

<script>
async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('error');
  errorEl.style.display = 'none';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    localStorage.setItem('lc_token', data.token);
    localStorage.setItem('lc_agent', JSON.stringify(data.agent));
    window.location.href = '/dashboard';
  } catch (err) {
    errorEl.textContent = err.message || 'Login failed';
    errorEl.style.display = 'block';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
